<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Hope – Select Role</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .role-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: #fff;
      border: 2px solid var(--color-primary);
      border-radius: var(--radius);
      color: var(--color-primary);
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      transition: background 0.25s ease, color 0.25s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .role-card:hover {
      background: var(--color-primary);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(37,99,235,0.25);
    }
    .role-card .role-emoji {
      font-size: 1.8rem;
    }
    .role-card .role-label {
      flex: 1;
    }
    .role-card .role-arrow {
      font-size: 1.2rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="hero-container">
    <div class="glass fade-in" style="max-width:480px;">
      <img src="assets/red_heart_logo.png" alt="Life Hope Logo" class="logo heartbeat" />
      <h1 class="app-title">Who Are You? 👋</h1>
      <p class="tagline">Select your role to continue to your dashboard</p>

      <div style="display:flex; flex-direction:column; gap:1rem; margin-top:1.5rem;">
        <a href="donor.html" class="role-card">
          <span class="role-emoji">🩸</span>
          <span class="role-label">Donor</span>
          <span class="role-arrow">→</span>
        </a>
        <a href="hospital.html" class="role-card">
          <span class="role-emoji">🏥</span>
          <span class="role-label">Hospital</span>
          <span class="role-arrow">→</span>
        </a>
        <a href="admin.html" class="role-card">
          <span class="role-emoji">⚙️</span>
          <span class="role-label">Admin</span>
          <span class="role-arrow">→</span>
        </a>
      </div>

      <p class="tagline" style="margin-top:1.5rem;">
        <a href="login.html" style="color:var(--color-primary); font-weight:600;">← Back to Login</a>
      </p>
    </div>
  </div>
</body>
</html>
